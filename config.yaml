input_dir: input
output_dir: output

render:
  dpi: 200
  workers: 4
  keep_rendered_pages: false

model:
  # If this file exists it is used. Otherwise, auto_download can fetch the
  # official DocStructBench checkpoint from Hugging Face.
  path: models/doclayout_yolo.pt
  auto_download: true
  repo_id: juliozhao/DocLayout-YOLO-DocStructBench
  filename: doclayout_yolo_docstructbench_imgsz1024.pt

detection:
  image_size: 1024
  confidence: 0.15        # Lowered from 0.2 to detect more potential diagrams
  iou: 0.5
  device: cpu
  figure_labels:
    - figure

crop:
  padding: 20
  refine: true
  whitespace_threshold: 245

quality:
  enabled: true
  min_width: 64
min_height: 80          # Lowered from 100 to capture smaller diagrams like animal cells
  min_area: 3500          # Lowered from 4096 to be less strict on small diagrams
  max_blank_ratio: 0.985  # Raised from 0.98 to capture blank pie charts and similar diagrams
  max_aspect_ratio: 4.5   # Raised from 4.0 to capture wide option rows
  min_confidence: 0.65    # Lowered from 0.7 to catch lower-confidence but valid diagrams
  max_width_ratio: 0.85
  max_height_ratio: 0.85

ocr:
  enabled: false
  language: en
  min_confidence: 0.5

analysis:
  enabled: false
  # auto prefers LLM vision, then OCR fallback.
  mode: auto
  # Optional explicit pairing. If omitted, filenames containing qp/ms are paired automatically.
  qp_pdf:
  ms_pdf:
  # Defaults to <per-question-pdf-output>/analysis/extracted_qna.json.
  output_json:
  dpi: 200
  image_size: 1000
  page_plan_enabled: true
  batch_size: 75
  workers: 6
  # Optional override. Defaults to 'workers' count if page_plan_enabled is true, otherwise 1.
  qp_workers:
  ms_workers: 12
  cleanup_workers: 16
  keep_pages: false
  cleanup_with_llm: true
  page_start:
  page_end:
  ms_page_start:
  ms_page_end:
  llm:
    enabled: true
    # OpenAI-compatible client. Uses GEMINI_* env vars from .env.
    api_key:
    api_key_env: GEMINI_API_KEY
    base_url:
    base_url_env: GEMINI_BASE_URL
    model:
    model_env: GEMINI_MODEL
    dotenv_path: .env
    cache_dir: .cache/question_analysis
    temperature: 0.1
    max_retries: 2
  ocr:
    enabled: false
    language: en
    min_confidence: 0.45

html:
  enabled: false
  # Defaults to <output_dir>/html when enabled.
  output_dir:
  # Optional structured QNA JSON. If omitted, HTML is built from extraction metadata.
  qna_json:
  subject:
  year:
  paper_key:
  group_by_parent: true
  copy_images: true
